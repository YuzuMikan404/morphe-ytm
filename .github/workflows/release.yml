name: Auto Release from MEGA

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y aapt
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf
          echo "--- rclone config check ---"
          rclone listremotes
          echo "--- MEGA connection test ---"
          rclone lsd "mega revancify:" --verbose || { echo "❌ MEGA接続失敗"; exit 1; }

      - name: Run release script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: python3 scripts/release.py

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release_state.json
          git diff --staged --quiet || \
            (git commit -m "chore: update release state [skip ci]" && git push)
